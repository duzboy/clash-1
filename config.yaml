# ==========================================
# 基础设置 (General)
# ==========================================

# 混合端口，同时支持 HTTP(S) 和 SOCKS5，推荐日常直接使用这个端口
mixed-port: 7890

# HTTP(S) 代理端口，供浏览器等应用使用
port: 7891

# SOCKS5 代理端口，供 Telegram 等支持 SOCKS5 的应用使用
socks-port: 7892

# 是否允许局域网内的其他设备（如手机、平板）连接电脑的代理。如果需要共享设为 true
allow-lan: false

# 运行模式: rule(规则模式) / global(全局模式) / direct(直连模式)
mode: rule

# 日志输出级别: info / warning / error / debug / silent
log-level: info

# 是否开启 IPv6 支持
ipv6: false

# 外部控制面板 API 端口 (例如供 Clash for Windows 界面使用)
external-controller: 127.0.0.1:9090

# 统一延迟 (Unified Delay) 
# 此参数主要在 Clash Premium / Clash Meta (Mihomo) 等高级内核中生效。
# 开启后，会改变策略组中延迟测试的计算方式。将握手延迟（TCP/TLS）与真正的 HTTP 测速延迟合并计算，
# 从而更真实地反映用户感知到的最终网络延迟。
unified-delay: true

# ==========================================
# 自定义 HOSTS (Hosts)
# ==========================================
# 类似于电脑系统中的 hosts 文件。
# 当你在使用 Clash 发出这些域名的请求时，Clash 不会去向 DNS 查询它们的真实 IP，
# 而是直接使用这里指定的 IP。常用来解决特定应用的 DNS 污染或强制指定连接的服务器。
hosts:
  time.facebook.com: 17.253.84.125
  time.android.com: 17.253.84.125


# ==========================================
# 代理节点 (Proxies)
# 数组参数：每种常见协议类型各举一个案例
# ==========================================
proxies:
  # ---------------------------------------------------------
  # 案例 1：Shadowsocks (ss) 协议节点 (展开写法)
  # ---------------------------------------------------------
  - name: "SS节点示例"                # [必填] 节点名称，你可以随意取名，但必须唯一，不能与其他节点重名
    type: ss                        # [必填] 节点协议类型，这里固定为 ss，代表 Shadowsocks
    server: server_address          # [必填] 服务器的主机名或 IP 地址
    port: 443                       # [必填] 服务器监听的端口号
    cipher: chacha20-ietf-poly1305  # [必填] 加密算法，必须与服务端一致（常见如 aes-256-gcm, chacha20-ietf-poly1305 等）
    password: "password"            # [必填] 连接密码
    # udp: true                     # [选填] 是否开启 UDP 转发。玩外服游戏或语音通话通常需要开启

  # 案例 1 补充：Shadowsocks (ss) 单行写法 / 内联对象
  # 这种写法在 YAML 语法中与上面完全等价，只是更节省行数。
  - {name: "🇭🇰 香港S01", type: ss, server: "z.r.e.g.i.4.m.d.1.hk01-ae5.entry.v51124-6.qpon", port: 19276, cipher: aes-256-gcm, password: "your_password", udp: true}

  # ---------------------------------------------------------
  # 案例 2：Vmess (V2Ray) 协议节点
  # ---------------------------------------------------------
  - name: "Vmess节点示例"             # [必填] 节点名称
    type: vmess                     # [必填] 协议类型，固定为 vmess
    server: server_address          # [必填] 服务器的主机名或 IP 地址
    port: 443                       # [必填] 服务器监听的端口号
    uuid: "your-uuid-string"        # [必填] 用户的 UUID，类似于密码，格式要求符合 UUID 规范
    alterId: 0                      # [必填] 额外 ID，早期 V2Ray 用来防探测，现在通常推荐设为 0（启用 VMessAEAD）
    cipher: auto                    # [必填] 加密方式，通常设为 auto 让其自动选择（或 aes-128-gcm, chacha20-poly1305 等）
    # tls: true                     # [选填] 如果服务端开启了 TLS 加密，这里必须设为 true
    # network: ws                   # [选填] 传输层协议，常见有 tcp, ws (WebSocket), grpc 等。默认是 tcp
    # ws-opts:                      # [选填] 如果 network 是 ws，这里配置 WebSocket 的相关参数
    #   path: /api                  # WebSocket 请求的路径
    #   headers:                    # HTTP 请求头
    #     Host: example.com         # 用于伪装的 Host 域名

  # ---------------------------------------------------------
  # 案例 3：Trojan 协议节点
  # ---------------------------------------------------------
  - name: "Trojan节点示例"            # [必填] 节点名称
    type: trojan                    # [必填] 协议类型，固定为 trojan
    server: server_address          # [必填] 服务器的主机名或 IP 地址 (通常必须是绑定的真实域名)
    port: 443                       # [必填] 端口号，通常是 443
    password: "password"            # [必填] Trojan 的密码
    # sni: example.com              # [选填] SNI (Server Name Indication) 域名，通常与 server 相同，如果不同需在此指定
    # skip-cert-verify: false       # [选填] 是否跳过服务器证书验证，默认为 false。极其不建议设为 true，会有被中间人攻击的风险
    # udp: true                     # [选填] 开启 UDP 转发



# ==========================================
# 代理组 (Proxy Groups)
# 数组参数：每种策略组类型各举一个案例
# ==========================================
proxy-groups:
  # ---------------------------------------------------------
  # 案例 1：select (手动选择策略) 
  # 作用：这是最常用的策略。它会在图形界面上生成一个下拉菜单或按钮组，你可以点击切换想用的节点。
  # ---------------------------------------------------------
  - name: "🚀 节点选择"  # [必填] 策略组名称，同样必须唯一。在 rules (路由规则) 中将被引用
    type: select         # [必填] 策略类型，select 表示手动选择
    proxies:             # [必填] 包含的节点或策略组列表
      - "SS节点示例"      # 可以直接写节点名称（必须和 proxies 中定义的 name 完全一样）
      - "Vmess节点示例"
      - "♻️ 自动测速"      # 【高阶用法】可以嵌套其他的策略组（例如下面定义的那个），这样当你选定这个时，它就会去执行那个组的逻辑

  # ---------------------------------------------------------
  # 案例 2：url-test (自动测速策略) 
  # 作用：Clash 会定时对组里的节点进行测速，并自动把流量切换到当前延迟最低的那个节点上。
  # ---------------------------------------------------------
  - name: "♻️ 自动测速"
    type: url-test       # [必填] 策略类型，url-test 表示自动测速
    url: http://www.gstatic.com/generate_204 # [必填] 测速使用的网址。这是一个轻量级无返回内容的页面，非常适合测速
    interval: 300        # [必填] 测速间隔时间，单位为秒。这里代表每 300 秒（5分钟）测一次
    tolerance: 50        # [选填] 容差值，单位为毫秒。如果测速发现新节点的延迟比当前使用节点的延迟低，但差值不超过 50ms，Clash 就不会切换节点，防止网络波动导致频繁无意义的切换
    proxies:
      - "SS节点示例"
      - "Vmess节点示例"

  # ---------------------------------------------------------
  # 案例 3：fallback (故障转移策略) 
  # 作用：也就是所谓的“主备模式”。优先使用列表中的第一个可用节点，只有当第一个节点挂了（测速失败），才会按顺序切到下一个。
  # ---------------------------------------------------------
  - name: "🚑 故障转移"
    type: fallback       # [必填] 策略类型，fallback 表示故障转移
    url: http://www.gstatic.com/generate_204 # [必填] 同样需要测速网址来判断节点是否挂了
    interval: 300        # [必填] 同样需要测速间隔
    proxies:             # 优先级由上到下，第一个是主节点，后面的全是备胎
      - "SS节点示例"      # 只要这个节点连得通（有网络返回），就算延迟高达 1000ms 也死守这个节点
      - "Trojan节点示例"  # 只有当上面那个节点彻底连不通了，才会切到这个节点

  # ---------------------------------------------------------
  # 案例 4：load-balance (负载均衡策略) 
  # 作用：让你的网络请求同时分摊到多个节点上。注意，它不是让网速叠加（因为单线程连接还是只能走一个节点），而是让并发请求分流。
  # ---------------------------------------------------------
  - name: "⚖️ 负载均衡"
    type: load-balance   # [必填] 策略类型，load-balance 表示负载均衡
    url: http://www.gstatic.com/generate_204
    interval: 300
    strategy: consistent-hashing # [选填] 负载均衡的分配策略。默认是 consistent-hashing（一致性哈希，同一个域名的请求尽量固定走同一个节点，防止网站风控提示 IP 频繁变动）。另一个可选值是 round-robin（轮询，按顺序轮流分配请求，IP 乱跳，一般不推荐）
    proxies:
      - "SS节点示例"
      - "Vmess节点示例"


# ==========================================
# 路由规则 (Rules)
# 数组参数：每种规则匹配类型各举一个案例
# 注意：规则是从上到下逐条匹配的！一旦匹配成功，就不再往下继续看了。
# ==========================================
rules:
  # ---------------------------------------------------------
  # 案例 1：DOMAIN-SUFFIX (域名后缀匹配) —— 最常用、最高效的匹配方式
  # 作用：只要访问的网址以指定的后缀结尾就触发匹配。
  # 比如这里写了 google.com，那么访问 www.google.com、api.google.com 甚至 google.com 本身都会被匹配到。
  # ---------------------------------------------------------
  - DOMAIN-SUFFIX,google.com,🚀 节点选择

  # ---------------------------------------------------------
  # 案例 2：DOMAIN-KEYWORD (域名关键字匹配) —— 杀伤力最大的匹配方式
  # 作用：只要请求的域名里面包含了这个词，不管它在什么位置，都会触发匹配。
  # 比如写了 github，那么 github.com、githubusercontent.com 都会被拦截。
  # 警告：容易误杀，尽量少用，推荐优先使用 DOMAIN-SUFFIX。
  # ---------------------------------------------------------
  - DOMAIN-KEYWORD,github,🚀 节点选择

  # ---------------------------------------------------------
  # 案例 3：DOMAIN (完整域名匹配) —— 最严格的匹配方式
  # 作用：只有当你访问的域名一字不差地等于它时才匹配。
  # 比如写了 www.apple.com，那么你访问 api.apple.com 是不会匹配这条规则的。
  # ---------------------------------------------------------
  - DOMAIN,www.apple.com,🚀 节点选择

  # ---------------------------------------------------------
  # 案例 4：IP-CIDR (IP地址/网段匹配) —— 专治直接通过 IP 访问的请求
  # 作用：匹配特定的 IP 地址范围。
  # no-resolve (强烈推荐加上)：遇到域名请求时，不去强制解析域名的 IP 来跟这条规则做比对，防止 DNS 泄漏并加快速度。
  # 只有当软件直接发起 IP 请求（比如直接访问 192.168.1.1）时，才触发此规则。
  # ---------------------------------------------------------
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve

  # ---------------------------------------------------------
  # 案例 5：GEOIP (国家地区 IP 库匹配) —— 经典的大陆直连策略
  # 作用：根据 Clash 内置或下载的 GeoIP 数据库，判断目标 IP 属于哪个国家。
  # 比如设为 CN (中国)，走 DIRECT (不走代理)，这意味着所有国内的网站都会直接通过你本地宽带连接，不消耗代理流量。
  # ---------------------------------------------------------
  - GEOIP,CN,DIRECT

  # ---------------------------------------------------------
  # 案例 6：DST-PORT (目标端口匹配) —— 专治某些特定端口的请求
  # 作用：只要目标请求的端口号符合，就触发匹配。
  # 比如端口 25 是标准的 SMTP 邮件发送端口。很多机场或 VPS 节点会禁止发送邮件(防止垃圾邮件)，
  # 所以碰到 25 端口直接让它走 DIRECT，避免节点连不上或者被封号。
  # ---------------------------------------------------------
  - DST-PORT,25,DIRECT

  # ---------------------------------------------------------
  # 案例 7：PROCESS-NAME (进程名匹配) —— 仅支持特定客户端
  # 作用：只要是指定的软件发出的网络请求，就执行匹配。
  # 比如强制让迅雷不走代理，避免下载大文件跑光代理流量。
  # 注意：这需要 Clash 在路由器或者以 TUN(虚拟网卡)/TAP 模式运行才能拿到进程名，普通系统代理模式下无效。
  # ---------------------------------------------------------
  - PROCESS-NAME,Thunder.exe,DIRECT

  # ---------------------------------------------------------
  # 案例 8：MATCH (兜底全匹配规则) —— 必须放在最后一行！
  # 作用：如果上面的所有规则都没有匹配上，剩下的流量该怎么走？
  # - 如果这里填 🚀 节点选择，这就是“白名单模式”（不知道的就翻墙）。
  # - 如果这里填 DIRECT，这就是“黑名单模式”（不知道的就不翻墙，只有上面写了的才翻）。
  # ---------------------------------------------------------
  - MATCH,🚀 节点选择
